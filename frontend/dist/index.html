icien",title:"Électricien",emoji:"⚡",stage:"tronc",filiere:"Filière technique ou ST",description:"Installer et réparer installations électriques en maison, usine ou chantier BTP.",qualities:["Précision","Sécurité","Logique","Travail en hauteur"],pathway:"CAP/BTS électricité, OFPPT. Choisir filière technique en 2ème année bac."},{id:"infirmier-tronc",title:"Infirmier(ère)",emoji:"❤️",stage:"tronc",filiere:"SVT (à choisir en 2ème année bac)",description:"Soigner et accompagner les patients à l'hôpital. Métier humain avec beaucoup d'emplois.",qualities:["Empathie","Réactivité","Rigueur","Calme"],pathway:"IFSI après le Bac. Dès le Tronc Commun : viser SVT et de bonnes notes en sciences."},{id:"commercant",title:"Commerçant / Vendeur",emoji:"🛒",stage:"tronc",filiere:"Sciences Économiques ou toutes filières",description:"Vendre, gérer une boutique ou aider dans le commerce familial. Compétences en communication et calcul.",qualities:["Communication","Persuasion","Organisation","Sourire"],pathway:"Bac économique puis BTS commerce, ou expérience terrain. Petits jobs l'été pour découvrir."},{id:"militaire-1bac",title:"Officier militaire (FAR)",emoji:"🪖",stage:"1bac",filiere:"Sciences Math ou PC recommandées",description:"En 1ère bac, préparez le concours d'officier : niveau scientifique, sport intensif, discipline.",qualities:["Leadership","Discipline","Endurance","Patriotisme"],pathway:"Concours FAR après Bac+2 ou Bac selon filière. Entraînement physique et révisions scientifiques en 1ère et 2ème bac."},{id:"medecin",title:"Médecin",emoji:"🩺",stage:"1bac",filiere:"SVT — excellentes notes",description:"Soigner les malades. En 1ère bac SVT, consolidez biologie et chimie pour le concours médecine.",qualities:["Empathie","Rigueur","Endurance","Analyse"],pathway:"Faculté de médecine après Bac SVT avec très bonnes notes et concours."},{id:"ingenieur",title:"Ingénieur",emoji:"⚙️",stage:"1bac",filiere:"Sciences Math A ou PC",description:"Construire, innover en industrie, informatique, BTP. En 1ère bac, approfondir maths et physique.",qualities:["Logique","Curiosité","Travail d'équipe","Précision"],pathway:"CPGE puis grandes écoles. Notes élevées en maths dès la 1ère bac."},{id:"technicien-1bac",title:"Technicien spécialisé (OFPPT)",emoji:"🏭",stage:"1bac",filiere:"Technique ou ST",description:"Métiers qualifiés en informatique, électronique, mécanique — insertion rapide après formation courte.",qualities:["Pratique","Autonomie","Précision","Adaptabilité"],pathway:"OFPPT ou lycée qualifiant après le Bac. En 1ère bac technique : stages et spécialisation."},{id:"pilote",title:"Pilote de ligne",emoji:"✈️",stage:"1bac",filiere:"Sciences Math A + anglais",description:"Piloter des avions civils ou militaires. Rêve exigeant : sciences, anglais et santé parfaite.",qualities:["Concentration","Calme","Anglais","Condition physique"],pathway:"École de pilotage (RAM Academy, écoles militaires) après Bac scientifique et tests médicaux."},{id:"enseignant",title:"Enseignant",emoji:"📚",stage:"1bac",filiere:"Lettres, Sciences ou SH selon matière",description:"Devenir professeur de maths, français, SVT… En 1ère bac, confirmez la matière que vous aimez enseigner.",qualities:["Patience","Pédagogie","Passion","Communication"],pathway:"Licence + Master MEEF ou concours ENS. Excellents résultats dans votre matière forte."},{id:"entrepreneur",title:"Créateur d'entreprise",emoji:"💡",stage:"1bac",filiere:"Sciences Économiques ou toutes",description:"Lancer son projet (e-commerce, services, artisanat). En 1ère bac, testez des petites idées.",qualities:["Audace","Créativité","Persévérance","Organisation"],pathway:"Pas de diplôme obligatoire mais Bac éco ou gestion aide. Clubs entrepreneuriat au lycée."}],schoolsTitle:"Établissements avant le Bac",schoolsNote:"Liste indicative d'établissements publics et privés. Vérifiez toujours les filières ouvertes auprès de l'établissement.",searchSchools:"Rechercher un établissement ou une ville...",filterAll:"Tous",filterCollege:"Collèges",filterLycee:"Lycées",typeCollege:"Collège",typeLycee:"Lycée",networkPublic:"Public",networkPrivate:"Privé",stages:[{id:"college",title:"Collège",yearsLabel:"1AC → 3AC · 12–15 ans",highlightTags:["Examen régional","Choix lycée","3 filières"],iconKey:"college",gradient:"from-amber-400 to-orange-500",bg:"from-amber-50 via-orange-50 to-yellow-50",intro:"Le collège marocain dure 3 ans. Vous y construisez les bases en français, arabe, maths et sciences, puis vous préparez l'examen régional et le passage au lycée.",topics:[{title:"1ère année collège (1AC)",description:"Adaptation au secondaire : nouvelles matières, rythme plus soutenu. Travaillez l'organisation et les méthodes de prise de notes dès le départ."},{title:"2ème année collège (2AC)",description:"Consolidation des acquis. Les notes commencent à compter pour l'orientation : surveillez surtout les maths, le français et les sciences."},{title:"3ème année collège (3AC)",description:"Dernière année avant le lycée. Préparez l'examen régional et réfléchissez sérieusement à la filière souhaitée (sciences, lettres ou technique)."},{title:"Examen régional",description:"Épreuve nationale en fin de 3AC (matières principales selon le programme). Un bon résultat facilite l'accès aux lycées réputés et renforce votre dossier."},{title:"Choix du lycée",description:"Comparez les filières proposées, les résultats au Bac de l'établissement, la distance et l'ambiance. Demandez conseil à vos professeurs et aux anciens élèves."},{title:"Filière Sciences",description:"Pour les profils à l'aise en maths et sciences. Ouvre l'accès aux filières scientifiques au lycée : Sciences Math, PC, SVT, Sciences et Technologies."},{title:"Filière Lettres",description:"Idéale si vous excellez en langues, français, arabe et sciences humaines. Mène vers Lettres, Sciences Humaines, Sciences Économiques ou Arts."},{title:"Filière Technique",description:"Orientation plus pratique (mécanique, électricité, informatique selon l'établissement). Pont naturel vers le lycée technique ou professionnel."}]},{id:"tronc",title:"Tronc Commun",yearsLabel:"Tronc Commun · ~16 ans",highlightTags:["Choix filière","10+ options","Décisif"],iconKey:"tronc",gradient:"from-sky-500 to-blue-600",bg:"from-sky-50 via-blue-50 to-indigo-50",intro:"Première année au lycée : enseignement commun à tous. C'est la dernière étape avant de choisir votre filière bac pour les 2 années suivantes — un choix structurant pour votre avenir.",topics:[{title:"Comment choisir sa filière",description:"Croisez vos notes (surtout maths, physique, SVT, français), vos goûts et les débouchés visés. Utilisez les tests RIASEC MyTawjeh et échangez avec le prof principal."},{title:"Sciences Math A",description:"La filière la plus exigeante. Maths approfondies, physique. Voie royale vers CPGE, grandes écoles d'ingénieurs, médecine et filières très sélectives."},{title:"Sciences Math B",description:"Variante scientifique avec un équilibre maths / sciences de la vie. Convient aux profils scientifiques qui envisagent SVT ou médecine."},{title:"Sciences Physiques (PC)",description:"Physique-chimie au centre du programme. Idéal pour l'ingénierie, la pharmacie, les sciences exactes et certaines écoles d'architecture."},{title:"Sciences de la Vie (SVT)",description:"Biologie, géologie, agronomie. Incontournable pour médecine, pharmacie, dentaire, sciences agronomiques et biotechnologies."},{title:"Sciences Économiques",description:"Maths, économie, gestion et comptabilité. Porte d'entrée vers ENCG, commerce, finance, audit et management."},{title:"Lettres & Sciences Humaines",description:"Littérature, philosophie, langues. Pour le droit, la communication, les sciences sociales, le journalisme et l'enseignement."},{title:"Sciences et Technologies",description:"Approche scientifique appliquée. Bon compromis pour les études techniques, l'informatique et certains BTS / formations spécialisées."},{title:"Arts Appliqués",description:"Créativité, design, arts plastiques. Pour les écoles d'art, l'architecture d'intérieur, le design graphique et les métiers créatifs."},{title:"Technique & professionnel",description:"Lycées techniques et qualifiants : formation concrète vers l'emploi ou la poursuite en BTS, DUT et formations professionnelles."}]},{id:"1bac",title:"1ère Bac",yearsLabel:"1ère Bac · ~17 ans",highlightTags:["Spécialisation","Coefficients","Post-bac"],iconKey:"bac1",gradient:"from-violet-500 to-purple-600",bg:"from-violet-50 via-purple-50 to-fuchsia-50",intro:"Deuxième année dans votre filière : les matières se spécialisent et les coefficients deviennent déterminants. C'est le moment de consolider votre niveau avant la Terminale.",topics:[{title:"Confirmer votre filière",description:"Si les résultats sont insuffisants, un changement peut encore être envisagé (selon règlement de l'établissement). Sinon, investissez pleinement dans votre spécialité."},{title:"Matières & coefficients",description:"Identifiez les matières à fort coefficient dans votre filière (ex. maths en SM, SVT en filière SVT). Priorisez-les dans vos révisions avec le tracker MyTawjeh."},{title:"Approfondir les spécialités",description:"Les cours deviennent plus techniques. Travaillez en groupe, demandez des séances de rattrapage et entraînez-vous sur les annales des années précédentes."},{title:"Organisation & méthode",description:"Établissez un planning hebdomadaire, alternez révision et repos, et fixez des objectifs par trimestre. La régularité vaut mieux que le bachotage."},{title:"Premiers pas post-bac",description:"Renseignez-vous sur les concours (médecine, ingénieurs), les CPGE, les ENCG et les universités. Certains concours regardent déjà les notes de 1ère bac."},{title:"Enrichir votre profil",description:"Clubs, bénévolat, olympiades, certifications en langues (anglais, français) : tout compte pour les admissions sélectives et les bourses."}]},{id:"2bac",title:"2ème Bac (Terminale)",yearsLabel:"2ème Bac · ~18 ans",highlightTags:["Examen national","Tawjihni","Orientation"],iconKey:"bac2",gradient:"from-rose-500 to-pink-600",bg:"from-rose-50 via-pink-50 to-red-50",intro:"Dernière année avant le diplôme : l'examen national du Baccalauréat et les premières démarches d'orientation vers l'enseignement supérieur ou la formation professionnelle.",topics:[{title:"Examen national du Bac",description:"Épreuves nationales en fin d'année (juin). Révisez avec les annales officielles, simulez les conditions d'examen et maîtrisez la gestion du temps."},{title:"Contrôle continu",description:"Les notes des devoirs surveillés et examens blancs comptent dans la note finale. Ne négligez aucun trimestre, même en fin d'année."},{title:"Plateforme Tawjihni",description:"Après les résultats, inscrivez-vous sur Tawjihni pour formuler vos vœux (facultés, écoles, BTS…). Respectez les dates et classez vos choix par priorité."},{title:"Révisions intensives",description:"Plan de révision par matière, fiches de synthèse, groupes de travail. Ciblez d'abord les matières à fort coefficient et vos points faibles identifiés sur MyTawjeh."},{title:"Gestion du stress",description:"Sommeil régulier, pauses, activité physique. Parlez à vos proches ou à un conseiller si l'anxiété devient envahissante — c'est normal, vous n'êtes pas seul."},{title:"Après les résultats",description:"Admis : validez votre inscription dans les délais. Non admis : sessions de rattrapage, réorientation ou année de renforcement selon votre situation et vos objectifs."}]}],schools:[{name:"Collège Ibn Khaldoun",city:"Rabat",type:"college",network:"public",stageLabel:"Collège"},{name:"Collège Al Qods",city:"Casablanca",type:"college",network:"public",stageLabel:"Collège"},{name:"Collège Arrazi",city:"Rabat",type:"college",network:"public",stageLabel:"Collège"},{name:"Collège Les Orangers",city:"Rabat",type:"college",network:"private",stageLabel:"Collège"},{name:"Collège International de Casablanca",city:"Casablanca",type:"college",network:"private",stageLabel:"Collège"},{name:"Lycée Mohamed V",city:"Casablanca",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Moulay Youssef",city:"Rabat",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Descartes",city:"Rabat",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Ibn Sina",city:"Meknès",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Majoma",city:"Tanger",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Omar Ibn Al Khattab",city:"Oujda",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée qualifiant Youssef Ibn Tachfine",city:"Agadir",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée Qualifiant Hassan II",city:"Fès",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Lycée d'Excellence Benguerir",city:"Benguerir",type:"lycee",network:"public",stageLabel:"Tronc Commun — 1ère/2ème Bac"},{name:"Groupe Scolaire La Résidence",city:"Casablanca",type:"lycee",network:"private",stageLabel:"Collège — Lycée"},{name:"Lycée Victor Hugo",city:"Marrakech",type:"lycee",network:"private",stageLabel:"Collège — Lycée"},{name:"Lycée Français Louis-Massignon",city:"Casablanca",type:"lycee",network:"private",stageLabel:"Collège — Lycée"},{name:"Lycée Technique Mohammadia",city:"Mohammedia",type:"lycee",network:"public",stageLabel:"Filière technique"}]}},formations:{headingSmall:"Types de Formation",headingLarge:"Trouvez la formation adaptée à votre projet",description:"Que vous souhaitiez intégrer une école d'ingénierie, une université ou suivre une formation",items:[{icon:"⚙️",color:"from-emerald-500 to-teal-600",svgKey:"engineer",title:"Ingénieur d'État",description:"Formation d'excellence en 3 à 5 ans via concours national (CNC) ou sur dossier.",tags:["CNC","ENSA","EMI","ENSIAS"],duration:"3 à 5 ans",level:"Bac+5",access:"Concours CNC ou sur dossier après CPGE",intro:"La formation d'Ingénieur d'État est la voie royale pour les passionnés de sciences et de technologie au Maroc. Elle forme des ingénieurs polyvalents capables de concevoir, développer et gérer des projets complexes dans tous les secteurs.",points:["Accès via le Concours National Commun (CNC) après 2 ans de CPGE","Écoles phares : EMI, ENSA, ENSIAS, INPT, ENIM, EHTP","Spécialités : Informatique, Génie Civil, Électronique, Industriel...","Débouchés excellents : secteur privé, public, international","Salaire moyen débutant : 8 000 – 15 000 DH/mois"],careers:["Ingénieur logiciel","Chef de projet","Ingénieur civil","Data Engineer","Consultant IT"],emoji:"🏗️"},{icon:"🎓",color:"from-violet-500 to-purple-700",svgKey:"master_spe",title:"Master Spécialisé",description:"Formation de spécialisation post-licence en 1 à 2 ans dans un domaine précis.",tags:["Bac+5","Spécialisation"],duration:"1 à 2 ans",level:"Bac+5",access:"Sur dossier après Licence ou équivalent",intro:"Le Master Spécialisé est une formation professionnalisante de haut niveau qui permet d'acquérir une expertise pointue dans un domaine précis. Il est très apprécié par les recruteurs pour son orientation pratique et professionnelle.",points:["Proposé par les grandes écoles et universités marocaines","Très orienté marché du travail et compétences pratiques","Possibilité de stage en entreprise de 4 à 6 mois","Spécialités : Finance, Marketing Digital, Data Science, RH...","Accessible aux titulaires d'une Licence ou d'un diplôme équivalent"],careers:["Responsable marketing","Analyste financier","Data Scientist","Chef de produit","Consultant RH"],emoji:"📊"},{icon:"🏛️",color:"from-blue-600 to-indigo-700",svgKey:"doctorat",title:"Doctorat",description:"Formation de recherche de haut niveau menant au grade de docteur.",tags:["Recherche","Bac+8"],duration:"3 à 5 ans",level:"Bac+8",access:"Sur dossier après Master Recherche",intro:"Le Doctorat est le diplôme le plus élevé du système universitaire. nte dans plusieurs villes, elle est reconnue pour la qualité de ses diplômés.",points:["Réseau de 9 écoles à travers le Maroc (Casablanca, Fès, Agadir...)","Formation en 5 ans avec spécialisation en 4ème et 5ème année","Partenariats avec de grandes entreprises nationales et internationales","Stages et projets professionnels intégrés au cursus","Accès via concours national très compétitif"],careers:["Manager commercial","Responsable marketing","Contrôleur de gestion","Entrepreneur","Auditeur"],emoji:"💼"},{icon:"📖",color:"from-purple-500 to-fuchsia-600",svgKey:"master",title:"Master",description:"Diplôme universitaire de niveau Bac+5 dans diverses disciplines académiques.",tags:["Bac+5","Université"],duration:"2 ans après Licence",level:"Bac+5",access:"Sur dossier après Licence (Bac+3)",intro:"Le Master universitaire est un diplôme de 2 ans qui approfondit les connaissances dans une discipline. Il existe deux types : le Master Recherche (orienté vers le Doctorat) et le Master Professionnel (orienté vers l'emploi).",points:["Deux parcours : Master Recherche et Master Professionnel","Accès sélectif sur dossier et parfois entretien","Mémoire de fin d'études obligatoire","Spécialités dans toutes les disciplines : sciences, lettres, droit, économie...","Passerelle vers le Doctorat pour le Master Recherche"],careers:["Cadre d'entreprise","Enseignant","Chercheur","Analyste","Responsable de projet"],emoji:"🎯"},{icon:"🔧",color:"from-teal-500 to-cyan-600",svgKey:"dut",title:"DUT",description:"Diplôme Universitaire de Technologie, formation technique de 2 ans après le Bac.",tags:["Bac+2","Technologie"],duration:"2 ans",level:"Bac+2",access:"Baccalauréat scientifique ou technique",intro:"Le DUT (Diplôme Universitaire de Technologie) est une formation courte et technique de 2 ans dispensée dans les IUT (Instituts Universitaires de Technologie). Il prépare à une insertion rapide ou à la poursuite d'études.",points:["Formation dispensée dans les IUT rattachés aux universités","Très
